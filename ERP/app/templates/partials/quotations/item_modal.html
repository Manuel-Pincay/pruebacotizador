<form
    action="/quotations/quotation-items/{{ item.id }}/edit"
    method="POST"
    enctype="multipart/form-data"
>

    <div class="space-y-5">

        <div>

            <label
                class="block mb-2 font-medium"
            >
                Cantidad
            </label>

            <input
                type="number"
                name="quantity"
                value="{{ item.quantity }}"
                class="w-full border rounded-xl p-3"
                min="1"
            >

        </div>

        <div>

            <label
                class="block mb-2 font-medium"
            >
                Precio unitario
            </label>

            <input
                type="number"
                step="0.01"
                name="unit_price"
                value="{{ item.unit_price }}"
                class="w-full border rounded-xl p-3"
                min="0"
                required
            >

        </div>

        <div>

            <label
                class="block mb-2 font-medium"
            >
                Temática
            </label>

            <input
                type="text"
                name="theme"
                value="{{ item.theme }}"
                class="w-full border rounded-xl p-3"
            >

        </div>

        <div>

            <label
                class="block mb-2 font-medium"
            >
                Medida
            </label>

            <input
                type="text"
                name="measure"
                value="{{ item.measure }}"
                class="w-full border rounded-xl p-3"
            >

        </div>

        <div>

            <label
                class="block mb-2 font-medium"
            >
                Color
            </label>

            <input
                type="text"
                name="color"
                value="{{ item.color }}"
                class="w-full border rounded-xl p-3"
            >

        </div>

        <div>

            <label
                class="flex items-center gap-3"
            >

                <input
                    type="checkbox"
                    name="logo"
                    value="true"

                    {% if item.logo %}
                    checked
                    {% endif %}
                >

                Lleva logo personalizado

            </label>

        </div>

        <div>
            <label class="block mb-2 font-medium">Imagen del producto</label>
            {% set item_img = product_image_url(item.product_image, thumb=true) if item.product_image else none %}
            {% if item_img %}
            <img src="{{ item_img }}" alt="Imagen producto" class="h-16 w-16 object-cover rounded-lg border mb-2" />
            {% endif %}
            <input type="file" name="product_image" accept=".png,.jpg,.jpeg,.webp"
                class="w-full border rounded-xl p-3 text-sm" />
        </div>

        <button
            class="
            bg-purple-600
            hover:bg-purple-700
            text-white
            px-6
            py-3
            rounded-xl
            "
        >
            Guardar Cambios
        </button>

    </div>

</form>
