<form
    id="addPaymentForm"
    class="space-y-5"
    enctype="multipart/form-data"
    data-quotation-id="{{ quotation_id }}"
>
    <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
        <div>
            <label class="block mb-2 font-medium">Valor abonado *</label>
            <input
                type="number"
                name="amount"
                id="payment_amount"
                step="0.01"
                min="0.01"
                max="{{ '%.2f'|format(pending_balance) }}"
                required
                placeholder="0.00"
                class="w-full border rounded-xl p-3"
            />
            <p class="text-sm text-gray-500 mt-1">
                Saldo pendiente: ${{ "%.2f"|format(pending_balance) }}
            </p>
        </div>

        <div>
            <label class="block mb-2 font-medium">Fecha *</label>
            <input
                type="date"
                name="payment_date"
                id="payment_date"
                value="{{ today }}"
                required
                class="w-full border rounded-xl p-3"
            />
        </div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
        <div>
            <label class="block mb-2 font-medium">Método de pago</label>
            <select name="payment_method" id="payment_method" class="w-full border rounded-xl p-3">
                <option value="Transferencia">Transferencia</option>
                <option value="Efectivo">Efectivo</option>
                <option value="Tarjeta">Tarjeta</option>
                <option value="Cheque">Cheque</option>
                <option value="Otro">Otro</option>
            </select>
        </div>

        <div>
            <label class="block mb-2 font-medium">Referencia</label>
            <input
                type="text"
                name="reference"
                id="payment_reference"
                maxlength="100"
                placeholder="Nº transacción, recibo, etc."
                class="w-full border rounded-xl p-3"
            />
        </div>
    </div>

    <div>
        <label class="block mb-2 font-medium">Observación</label>
        <textarea
            name="notes"
            id="payment_notes"
            rows="3"
            placeholder="Notas adicionales..."
            class="w-full border rounded-xl p-3"
        ></textarea>
    </div>

    <div>
        <label class="block mb-2 font-medium">Comprobante</label>
        <input
            type="file"
            name="transfer_receipt"
            id="payment_receipt"
            accept=".jpg,.jpeg,.png,.pdf,image/jpeg,image/png,application/pdf"
            class="w-full border rounded-xl p-3"
        />
        <p class="text-sm text-gray-500 mt-1">
            JPG, JPEG, PNG o PDF. Máximo 10 MB.
        </p>
    </div>

    <div id="paymentFormError" class="hidden text-red-600 text-sm"></div>

    <div class="flex justify-end gap-3 pt-2">
        <button
            type="button"
            onclick="closePaymentModal()"
            class="px-6 py-3 rounded-xl border border-gray-300 hover:bg-gray-50"
        >
            Cancelar
        </button>
        <button
            type="button"
            onclick="submitPaymentForm()"
            class="bg-purple-600 hover:bg-purple-700 text-white px-6 py-3 rounded-xl"
        >
            Registrar Abono
        </button>
    </div>
</form>
