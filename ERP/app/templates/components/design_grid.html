{% macro design_grid(designs, quotation_id, max_designs=4) %}
<div class="grid grid-cols-2 lg:grid-cols-4 gap-3" id="design-grid-{{ quotation_id }}">
    {% for design in designs %}
    {% set url = design_image_url(design.filename) %}
    <div class="relative group">
        <button
            type="button"
            onclick="openDesignPreview('{{ url }}')"
            class="w-full h-36 sm:h-40 rounded-xl border border-gray-200 bg-gray-50 overflow-hidden flex items-center justify-center p-2 hover:border-purple-300 hover:ring-2 hover:ring-purple-100 transition"
            title="Ver diseño {{ loop.index }}"
        >
            <img
                src="{{ url }}"
                alt="Diseño {{ loop.index }}"
                class="max-w-full max-h-full w-auto h-auto object-contain"
            />
        </button>
        <span class="absolute top-2 left-2 text-[10px] font-medium bg-black/55 text-white px-1.5 py-0.5 rounded-md pointer-events-none">
            {{ loop.index }}
        </span>
        <form
            action="/quotations/{{ quotation_id }}/designs/{{ design.id }}/delete"
            method="POST"
            onsubmit="return erpConfirmForm(event, '¿Eliminar esta imagen?')"
            class="absolute top-2 right-2"
        >
            <button
                type="submit"
                class="w-7 h-7 rounded-lg bg-red-500/90 hover:bg-red-600 text-white text-xs shadow opacity-0 group-hover:opacity-100 focus:opacity-100 transition"
                title="Eliminar imagen {{ loop.index }}"
            >
                ✕
            </button>
        </form>
    </div>
    {% endfor %}

    {% set empty_slots = max_designs - (designs|length) %}
    {% for i in range(empty_slots) %}
    <div class="h-36 sm:h-40 rounded-xl border-2 border-dashed border-gray-200 bg-gray-50/80 flex flex-col items-center justify-center text-gray-300 text-xs gap-1">
        <span class="text-lg">🖼</span>
        <span>Sin imagen</span>
    </div>
    {% endfor %}
</div>
{% endmacro %}
