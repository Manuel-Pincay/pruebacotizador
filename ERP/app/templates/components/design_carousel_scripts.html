{% macro design_carousel_scripts() %}
<script>
    function moveDesignCarousel(carouselId, direction) {
        const carousel = document.getElementById(carouselId);
        if (!carousel) return;
        const total = carousel.querySelectorAll(".carousel-slide").length;
        if (total <= 1) return;
        let index = parseInt(carousel.dataset.index || "0", 10) + direction;
        if (index < 0) index = total - 1;
        if (index >= total) index = 0;
        goDesignCarousel(carouselId, index);
    }

    function goDesignCarousel(carouselId, index) {
        const carousel = document.getElementById(carouselId);
        if (!carousel) return;
        const track = carousel.querySelector(".carousel-track");
        const total = carousel.querySelectorAll(".carousel-slide").length;
        if (!track || total === 0) return;
        carousel.dataset.index = String(index);
        track.style.transform = `translateX(-${(index * 100) / total}%)`;
        carousel.querySelectorAll(".carousel-dot").forEach((dot, dotIndex) => {
            dot.classList.toggle("bg-purple-600", dotIndex === index);
            dot.classList.toggle("bg-gray-300", dotIndex !== index);
        });
    }

    function openDesignCarouselPreview(carouselId, index) {
        const carousel = document.getElementById(carouselId);
        if (!carousel) return;
        const slides = carousel.querySelectorAll(".carousel-slide img");
        const img = slides[index];
        if (!img) return;
        openDesignPreview(img.src);
    }

    function openDesignPreview(url) {
        const modal = document.getElementById("designPreviewModal");
        const img = document.getElementById("designPreviewImage");
        if (!modal || !img) return;
        img.src = url;
        modal.classList.remove("hidden");
        modal.classList.add("flex");
    }

    function closeDesignPreview() {
        const modal = document.getElementById("designPreviewModal");
        if (!modal) return;
        modal.classList.add("hidden");
        modal.classList.remove("flex");
        const img = document.getElementById("designPreviewImage");
        if (img) img.src = "";
    }
</script>
{% endmacro %}
