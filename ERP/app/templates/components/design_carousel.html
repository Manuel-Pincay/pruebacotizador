{% macro design_carousel(urls, carousel_id, compact=false) %}
{% if urls and urls|length > 0 %}
<div class="design-carousel relative" id="{{ carousel_id }}" data-index="0">
    <div class="overflow-hidden rounded-xl border border-gray-200 bg-gray-50">
        <div class="carousel-track flex transition-transform duration-300 ease-out"
            style="width: {{ urls|length * 100 }}%;">
            {% for url in urls %}
            <div class="carousel-slide shrink-0" style="width: {{ (100 / urls|length) }}%;">
                <button type="button" onclick="openDesignCarouselPreview('{{ carousel_id }}', {{ loop.index0 }})"
                    class="block w-full {% if compact %}h-16{% else %}h-48 md:h-64{% endif %}">
                    <img src="{{ url }}" alt="Diseño {{ loop.index }}" class="w-full h-full object-cover" />
                </button>
            </div>
            {% endfor %}
        </div>
    </div>
    {% if urls|length > 1 %}
    <button type="button" onclick="moveDesignCarousel('{{ carousel_id }}', -1)"
        class="absolute left-1 top-1/2 -translate-y-1/2 w-7 h-7 rounded-full bg-white/90 shadow text-sm hover:bg-white">‹</button>
    <button type="button" onclick="moveDesignCarousel('{{ carousel_id }}', 1)"
        class="absolute right-1 top-1/2 -translate-y-1/2 w-7 h-7 rounded-full bg-white/90 shadow text-sm hover:bg-white">›</button>
    <div class="flex justify-center gap-1.5 mt-2">
        {% for url in urls %}
        <button type="button" onclick="goDesignCarousel('{{ carousel_id }}', {{ loop.index0 }})"
            class="carousel-dot w-2 h-2 rounded-full bg-gray-300 {% if loop.first %}bg-purple-600{% endif %}"></button>
        {% endfor %}
    </div>
    {% endif %}
</div>
{% else %}
<div class="{% if compact %}h-16{% else %}h-32{% endif %} border-2 border-dashed rounded-xl flex items-center justify-center text-gray-400 text-xs">
    Sin diseño
</div>
{% endif %}
{% endmacro %}
