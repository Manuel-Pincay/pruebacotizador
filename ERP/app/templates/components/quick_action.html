{% macro quick_action(title, url, icon) %}

<a
    href="{{ url }}"
    class="bg-white rounded-2xl border border-gray-100
    p-5 flex flex-col items-center justify-center
    hover:shadow-md hover:border-purple-300 transition"
>

    <div class="text-3xl mb-2">
        {{ icon }}
    </div>

    <span class="font-medium text-center">
        {{ title }}
    </span>

</a>

{% endmacro %}
