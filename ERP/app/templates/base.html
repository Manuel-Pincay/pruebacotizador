<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>
        INNOVA ARTE ERP
    </title>

    <script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-100">

    <div class="flex min-h-screen">

        <!-- SIDEBAR -->

        <aside class="w-72 bg-gradient-to-b from-purple-900 to-purple-800 text-white flex flex-col shadow-2xl">

            <!-- LOGO -->

            <div class="p-6 border-b border-purple-700">

                <h1 class="text-3xl font-bold tracking-wide">
                    INNOVA
                </h1>

                <div class="text-purple-200 text-sm mt-1">
                    ERP Empresarial
                </div>

            </div>

            <!-- NAVIGATION -->

            <nav class="flex-1 p-4 space-y-3 overflow-y-auto">

    <!-- DASHBOARD -->

    <a
        href="/"
        class="flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-purple-700 transition"
    >

        <span>
            📊
        </span>

        <span>
            Dashboard
        </span>

    </a>

    <!-- COTIZACIONES -->

    <a
        href="/quotations"
        class="flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-purple-700 transition"
    >

        <span>
            📄
        </span>

        <span>
            Cotizaciones
        </span>

    </a>

    <!-- KANBAN -->

    <a
        href="/production/kanban"
        class="flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-purple-700 transition"
    >

        <span>
            🗂️
        </span>

        <span>
            Kanban
        </span>

    </a>

    <!-- BASE DE DATOS -->

    <div>

        <button
            onclick="toggleSidebarMenu('databaseMenu')"
            class="w-full flex justify-between items-center px-4 py-3 rounded-xl hover:bg-purple-700 transition"
        >

            <div class="flex items-center gap-3">

                <span>
                    📚
                </span>

                <span>
                    Base de Datos
                </span>

            </div>

            <span>
                ▼
            </span>

        </button>

        <div
            id="databaseMenu"
            class="hidden ml-6 mt-2 space-y-2"
        >

            <a
                href="/clients"
                class="block px-4 py-2 rounded-lg hover:bg-purple-700"
            >
                👥 Clientes
            </a>

            <a
                href="/products"
                class="block px-4 py-2 rounded-lg hover:bg-purple-700"
            >
                📦 Productos
            </a>

        </div>

    </div>

    <!-- PRODUCCION -->

    <div>

        <button
            onclick="toggleSidebarMenu('productionMenu')"
            class="w-full flex justify-between items-center px-4 py-3 rounded-xl hover:bg-purple-700 transition"
        >

            <div class="flex items-center gap-3">

                <span>
                    🏭
                </span>

                <span>
                    Producción
                </span>

            </div>

            <span>
                ▼
            </span>

        </button>

        <div
            id="productionMenu"
            class="hidden ml-6 mt-2 space-y-2"
        >

            <a
                href="/production"
                class="block px-4 py-2 rounded-lg hover:bg-purple-700"
            >
                🏭 Producción
            </a>

            <a
                href="/production/calendar"
                class="block px-4 py-2 rounded-lg hover:bg-purple-700"
            >
                📅 Calendario
            </a>

            <a
                href="/shipments/"
                class="block px-4 py-2 rounded-lg hover:bg-purple-700"
            >
                🚚 Envíos
            </a>

        </div>

    </div>

    <!-- SISTEMA -->

    <div>

        <button
            onclick="toggleSidebarMenu('systemMenu')"
            class="w-full flex justify-between items-center px-4 py-3 rounded-xl hover:bg-purple-700 transition"
        >

            <div class="flex items-center gap-3">

                <span>
                    ⚙️
                </span>

                <span>
                    Sistema
                </span>

            </div>

            <span>
                ▼
            </span>

        </button>

        <div
            id="systemMenu"
            class="hidden ml-6 mt-2 space-y-2"
        >

            <a
                href="/users"
                class="block px-4 py-2 rounded-lg hover:bg-purple-700"
            >
                🔐 Usuarios
            </a>

        </div>

    </div>

            </nav>
            <!-- FOOTER -->

            <div class="p-4 border-t border-purple-700">

                <a
                    href="/logout"
                    class="flex items-center justify-center gap-2 bg-red-500 hover:bg-red-600 text-white px-4 py-3 rounded-xl transition"
                >

                    <span>
                        🚪
                    </span>

                    <span>
                        Cerrar sesión
                    </span>

                </a>

            </div>

        </aside>

        <!-- MAIN -->

        <main class="flex-1 p-8 overflow-auto">

            {% block content %}
            {% endblock %}

        </main>

    </div>

    <script>

function toggleSidebarMenu(id) {
    const menu = document.getElementById(id)

    menu.classList.toggle("hidden")    

}

</script>
</body>

</html>
