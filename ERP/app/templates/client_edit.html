{% extends 'base.html' %} {% block content %}

<div class="max-w-4xl mx-auto">
  <!-- HEADER -->

  <div class="flex justify-between items-center mb-8">
    <div>
      <h1 class="text-2xl md:text-3xl font-bold">Editar Cliente</h1>

      <p class="text-gray-500 mt-1">Actualiza la información del cliente</p>
    </div>

    <a
      href="/clients"
      class="bg-gray-200 hover:bg-gray-300 px-5 py-3 rounded-xl transition"
    >
      Volver
    </a>
  </div>

  <!-- FORM -->

  <form
    action="/clients/{{ client.id }}/edit"
    method="POST"
    class="bg-white rounded-2xl shadow p-8"
  >
    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
      <!-- NAME -->

      <div>
        <label class="block text-sm font-semibold mb-2"> Nombre </label>

        <input
          type="text"
          name="name"
          value="{{ client.name }}"
          class="w-full border rounded-xl p-3"
          required
        />
      </div>

      <!-- PHONE -->

      <div>
        <label class="block text-sm font-semibold mb-2"> Teléfono </label>

        <input
          type="text"
          name="phone"
          value="{{ client.phone }}"
          class="w-full border rounded-xl p-3"
        />
      </div>

      <!-- EMAIL -->

      <div>
        <label class="block text-sm font-semibold mb-2"> Email </label>

        <input
          type="email"
          name="email"
          value="{{ client.email }}"
          class="w-full border rounded-xl p-3"
        />
      </div>

      <!-- RUC -->

      <div>
        <label class="block text-sm font-semibold mb-2"> RUC / Cédula </label>

        <input
          type="text"
          name="ruc_ci"
          value="{{ client.ruc_ci }}"
          class="w-full border rounded-xl p-3"
        />
      </div>

      <!-- COMPANY -->

      <div>
        <label class="block text-sm font-semibold mb-2"> Empresa </label>

        <input
          type="text"
          name="company"
          value="{{ client.company }}"
          class="w-full border rounded-xl p-3"
        />
      </div>

      <!-- CLIENT TYPE -->

      <div>
        <label class="block text-sm font-semibold mb-2"> Tipo Cliente </label>

        <select name="client_type" class="w-full border rounded-xl p-3">
          <option
            value="minorista"
            {%
            if
            client.client_type=""
            ="minorista"
            %}
            selected
            {%
            endif
            %}
          >
            Minorista
          </option>

          <option
            value="mayorista"
            {%
            if
            client.client_type=""
            ="mayorista"
            %}
            selected
            {%
            endif
            %}
          >
            Mayorista
          </option>
        </select>
      </div>
    </div>

    <!-- ADDRESS -->

    <div class="mt-6">
      <label class="block text-sm font-semibold mb-2"> Dirección </label>

      <textarea
    name="address"
    rows="4"
    class="w-full border rounded-xl p-3"
>{{ client.address or '' }}</textarea>
    </div>
    <!-- OBSERVACIONES -->

    <div class="mt-6">
      <label class="block text-sm font-semibold mb-2"> Observaciones </label>

      <textarea
        name="observations"
        rows="4"
        class="w-full border rounded-xl p-3"
      >
        {{ client.observations or '' }}</textarea
      >
    </div>

    <!-- BUTTONS -->

    <div class="mt-8 flex gap-4">
      <button
        type="submit"
        class="bg-purple-700 hover:bg-purple-800 text-white px-8 py-3 rounded-xl transition"
      >
        Guardar Cambios
      </button>

      <a
        href="/clients"
        class="bg-gray-200 hover:bg-gray-300 px-8 py-3 rounded-xl transition"
      >
        Cancelar
      </a>
    </div>
  </form>
</div>

{% endblock %}
