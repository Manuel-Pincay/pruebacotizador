{% extends 'layouts/base.html' %}

{% block content %}
<div class="max-w-xl mx-auto">
    <h1 class="text-2xl font-bold text-slate-900 mb-6">Mi Perfil</h1>

    <div class="bg-white rounded-2xl border border-gray-200 p-6 shadow-sm space-y-4">
        <div>
            <div class="text-sm text-gray-500">Nombre</div>
            <div class="text-lg font-semibold">{{ user.full_name or user.username }}</div>
        </div>
        <div>
            <div class="text-sm text-gray-500">Usuario</div>
            <div class="font-medium">{{ user.username }}</div>
        </div>
        <div>
            <div class="text-sm text-gray-500">Rol</div>
            <div class="font-medium capitalize">{{ user.role }}</div>
        </div>
        <div>
            <div class="text-sm text-gray-500">Estado</div>
            <div class="font-medium">{{ 'Activo' if user.active else 'Inactivo' }}</div>
        </div>
    </div>
</div>
{% endblock %}
