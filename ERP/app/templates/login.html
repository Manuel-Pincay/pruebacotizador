<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>{{ company_name }} ERP</title>

    <script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-100">

    <div class="flex h-screen">

        <div class="hidden lg:flex w-1/2 bg-purple-800 items-center justify-center">

            <div class="text-white text-center">

                <h1 class="text-5xl font-bold mb-4">
                    {{ company_name }}
                </h1>

                <p class="text-xl">
                    Sistema ERP de Producción
                </p>

            </div>

        </div>

        <div class="flex-1 flex items-center justify-center">

            <form
                method="POST"
                class="bg-white p-10 rounded-2xl shadow-xl w-full max-w-md"
            >

                <h2 class="text-2xl md:text-3xl font-bold mb-8 text-center text-purple-800">
                    Iniciar Sesión
                </h2>

                {% if error %}

                <div class="bg-red-100 text-red-700 p-3 rounded mb-4">
                    {{ error }}
                </div>

                {% endif %}

                <input
                    type="text"
                    name="username"
                    placeholder="Usuario"
                    class="w-full border p-3 rounded-lg mb-4"
                >

                <input
                    type="password"
                    name="password"
                    placeholder="Contraseña"
                    class="w-full border p-3 rounded-lg mb-6"
                >

                <button
                    class="w-full btn-primary p-3 rounded-lg"
                >
                    Ingresar
                </button>

            </form>

        </div>

    </div>

</body>

</html>
