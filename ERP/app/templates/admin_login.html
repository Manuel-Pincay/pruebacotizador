{% extends 'base.html' %}

{% block content %}

<div class="min-h-screen bg-gradient-to-br from-purple-50 to-purple-100 flex items-center justify-center p-4">

    <div class="bg-white rounded-2xl shadow-2xl p-8 max-w-md w-full">

        <!-- HEADER -->
        <div class="text-center mb-8">

            <h1 class="text-4xl font-bold text-purple-700 mb-2">
                ADMINISTRACIÓN
            </h1>

            <p class="text-gray-600">
                Ingrese su contraseña
            </p>

        </div>

        <!-- ERROR -->
        {% if error %}

        <div class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded-xl mb-6">
            {{ error }}
        </div>

        {% endif %}

        <!-- FORM -->
        <form method="post" action="/secretadmin/verify" class="space-y-6">

            <!-- PASSWORD -->
            <div>

                <label class="block text-sm font-semibold text-gray-700 mb-2">
                    Contraseña
                </label>

                <input
                    type="password"
                    name="password"
                    required
                    placeholder="Ingrese la contraseña"
                    class="w-full border-2 border-gray-300 rounded-xl p-3 focus:border-purple-500 focus:outline-none transition"
                >

            </div>

            <!-- BUTTON -->
            <button
                type="submit"
                class="w-full bg-purple-700 hover:bg-purple-800 text-white font-semibold p-3 rounded-xl transition duration-200"
            >
                Acceder
            </button>

        </form>

        <!-- FOOTER -->
        <div class="text-center mt-8 pt-6 border-t border-gray-200">

            <p class="text-sm text-gray-600">
                Sistema de Administración
            </p>

        </div>

    </div>

</div>

{% endblock %}
