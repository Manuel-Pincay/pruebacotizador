<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar contraseña — {{ company_name }}</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

    <div class="flex min-h-screen items-center justify-center p-4 sm:p-6">

        <form method="POST" class="bg-white p-6 sm:p-10 rounded-2xl shadow-xl w-full max-w-md">

            <h2 class="text-2xl font-bold mb-2 text-center text-purple-800">
                Recuperar contraseña
            </h2>

            <p class="text-sm text-gray-500 text-center mb-6">
                Solicita el código de recuperación al administrador del sistema.
            </p>

            {% if error %}
            <div class="bg-red-100 text-red-700 p-3 rounded mb-4">
                {{ error }}
            </div>
            {% endif %}

            <label class="block text-sm font-medium text-gray-700 mb-1">Usuario</label>
            <input
                type="text"
                name="username"
                value="{{ username or '' }}"
                required
                autocomplete="username"
                class="w-full border p-3 rounded-lg mb-4"
            >

            <label class="block text-sm font-medium text-gray-700 mb-1">Código de recuperación</label>
            <input
                type="password"
                name="recovery_code"
                required
                placeholder="Código del administrador"
                class="w-full border p-3 rounded-lg mb-4"
            >

            <label class="block text-sm font-medium text-gray-700 mb-1">Nueva contraseña</label>
            <input
                type="password"
                name="new_password"
                required
                minlength="6"
                autocomplete="new-password"
                class="w-full border p-3 rounded-lg mb-4"
            >

            <label class="block text-sm font-medium text-gray-700 mb-1">Confirmar contraseña</label>
            <input
                type="password"
                name="confirm_password"
                required
                minlength="6"
                autocomplete="new-password"
                class="w-full border p-3 rounded-lg mb-6"
            >

            <button type="submit" class="w-full bg-purple-700 hover:bg-purple-800 text-white p-3 rounded-lg mb-3">
                Restablecer contraseña
            </button>

            <p class="text-center text-sm">
                <a href="/login" class="text-purple-700 hover:underline">← Volver al login</a>
            </p>

        </form>

    </div>

</body>

</html>
