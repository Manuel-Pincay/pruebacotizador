<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar contraseña — {{ company_name }}</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

    <div class="flex min-h-screen items-center justify-center p-4 sm:p-6">

        <form method="POST" class="bg-white p-6 sm:p-10 rounded-2xl shadow-xl w-full max-w-md">

            <a href="/login" class="text-sm text-purple-700 hover:underline">← Volver al inicio de sesión</a>

            <h2 class="text-xl sm:text-2xl font-bold mt-4 mb-2 text-purple-800">
                Recuperar contraseña
            </h2>
            <p class="text-sm text-gray-500 mb-6">
                Ingrese su usuario, la clave de administrador y la nueva contraseña.
            </p>

            {% if error %}
            <div class="bg-red-100 text-red-700 p-3 rounded-lg mb-4 text-sm">
                {{ error }}
            </div>
            {% endif %}

            {% if success %}
            <div class="bg-green-100 text-green-800 p-3 rounded-lg mb-4 text-sm">
                {{ success }}
            </div>
            {% endif %}

            {% if not success %}
            <label class="block text-sm font-medium text-gray-700 mb-1">Usuario</label>
            <input type="text" name="username" required
                value="{{ username or '' }}"
                placeholder="Nombre de usuario"
                class="w-full border p-3 rounded-lg mb-4" />

            <label class="block text-sm font-medium text-gray-700 mb-1">Clave de administrador</label>
            <input type="password" name="admin_password" required
                placeholder="Clave del administrador del sistema"
                class="w-full border p-3 rounded-lg mb-4" />

            <label class="block text-sm font-medium text-gray-700 mb-1">Nueva contraseña</label>
            <input type="password" name="new_password" required minlength="4"
                placeholder="Mínimo 4 caracteres"
                class="w-full border p-3 rounded-lg mb-4" />

            <label class="block text-sm font-medium text-gray-700 mb-1">Confirmar nueva contraseña</label>
            <input type="password" name="confirm_password" required minlength="4"
                placeholder="Repita la nueva contraseña"
                class="w-full border p-3 rounded-lg mb-6" />

            <button type="submit"
                class="w-full bg-purple-700 hover:bg-purple-800 text-white p-3 rounded-lg font-medium">
                Restablecer contraseña
            </button>
            {% else %}
            <a href="/login"
                class="block w-full text-center bg-purple-700 hover:bg-purple-800 text-white p-3 rounded-lg font-medium">
                Ir a iniciar sesión
            </a>
            {% endif %}

        </form>

    </div>

</body>

</html>
