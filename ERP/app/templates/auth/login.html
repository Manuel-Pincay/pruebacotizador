<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ company_name }} ERP</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

    <div class="flex h-screen">

        <div class="hidden lg:flex w-1/2 bg-purple-800 items-center justify-center">
            <div class="text-white text-center">
                <h1 class="text-5xl font-bold mb-4">{{ company_name }}</h1>
                <p class="text-xl">Sistema ERP de Producción</p>
            </div>
        </div>

        <div class="flex-1 flex items-center justify-center p-4 sm:p-6">

            <form method="POST" class="bg-white p-6 sm:p-10 rounded-2xl shadow-xl w-full max-w-md">

                <h2 class="text-xl sm:text-2xl md:text-3xl font-bold mb-6 sm:mb-8 text-center text-purple-800">
                    Iniciar Sesión
                </h2>

                {% if success %}
                <div class="bg-green-100 text-green-800 p-3 rounded mb-4">
                    {{ success }}
                </div>
                {% endif %}

                {% if error %}
                <div class="bg-red-100 text-red-700 p-3 rounded mb-4">
                    {{ error }}
                </div>
                {% endif %}

                <input
                    type="text"
                    name="username"
                    placeholder="Usuario"
                    value="{{ username or '' }}"
                    required
                    autocomplete="username"
                    class="w-full border p-3 rounded-lg mb-4"
                >

                <input
                    type="password"
                    name="password"
                    placeholder="Contraseña"
                    required
                    autocomplete="current-password"
                    class="w-full border p-3 rounded-lg mb-4"
                >

                <button type="submit" class="w-full bg-purple-700 hover:bg-purple-800 text-white p-3 rounded-lg mb-4">
                    Ingresar
                </button>

                <p class="text-center text-sm">
                    <a href="/login/recuperar" class="text-purple-700 hover:underline">
                        ¿Olvidaste tu contraseña?
                    </a>
                </p>

            </form>

        </div>

    </div>

</body>

</html>
