<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>{{ company_name }} ERP</title>

    <script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-100">

    <div class="flex h-screen">

        <div class="hidden lg:flex w-1/2 bg-purple-800 items-center justify-center">

            <div class="text-white text-center">

                <h1 class="text-5xl font-bold mb-4">
                    {{ company_name }}
                </h1>

                <p class="text-xl">
                    Sistema ERP de Producción
                </p>

            </div>

        </div>

        <div class="flex-1 flex items-center justify-center p-4 sm:p-6">

            <form
                id="loginForm"
                method="POST"
                action="/login"
                class="bg-white p-6 sm:p-10 rounded-2xl shadow-xl w-full max-w-md"
                novalidate
            >

                <h2 class="text-xl sm:text-2xl md:text-3xl font-bold mb-6 sm:mb-8 text-center text-purple-800">
                    Iniciar Sesión
                </h2>

                {% if error %}

                <div id="loginError" class="bg-red-100 text-red-700 p-3 rounded mb-4">
                    {{ error }}
                </div>

                {% else %}

                <div id="loginError" class="hidden bg-red-100 text-red-700 p-3 rounded mb-4"></div>

                {% endif %}

                <input
                    id="username"
                    type="text"
                    name="username"
                    value="{{ username or '' }}"
                    placeholder="Usuario"
                    autocomplete="username"
                    required
                    class="w-full border p-3 rounded-lg mb-4"
                >

                <input
                    id="password"
                    type="password"
                    name="password"
                    placeholder="Contraseña"
                    autocomplete="current-password"
                    required
                    class="w-full border p-3 rounded-lg mb-6"
                >

                <button
                    type="submit"
                    class="w-full btn-primary p-3 rounded-lg"
                >
                    Ingresar
                </button>

                <p class="text-center mt-5">
                    <a href="/login/recuperar-clave" class="text-sm text-purple-700 hover:underline">
                        ¿Olvidó su contraseña?
                    </a>
                </p>

            </form>

        </div>

    </div>

    <script>
        document.getElementById("loginForm").addEventListener("submit", function (event) {
            const username = document.getElementById("username").value.trim();
            const password = document.getElementById("password").value.trim();
            const errorBox = document.getElementById("loginError");

            if (!username || !password) {
                event.preventDefault();
                errorBox.textContent = "Ingrese usuario y contraseña.";
                errorBox.classList.remove("hidden");
                (username ? document.getElementById("password") : document.getElementById("username")).focus();
                return;
            }

            errorBox.classList.add("hidden");
        });
    </script>

</body>

</html>
