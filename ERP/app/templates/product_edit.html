{% extends 'base.html' %}

{% block content %}

<div class="max-w-5xl mx-auto">

    <!-- HEADER -->

    <div class="flex justify-between items-center mb-8">

        <div>

            <h1 class="text-3xl font-bold">
                Editar Producto
            </h1>

            <p class="text-gray-500 mt-1">
                Actualiza la información del producto
            </p>

        </div>

        <a
            href="/products"
            class="bg-gray-200 hover:bg-gray-300 px-5 py-3 rounded-xl transition"
        >
            Volver
        </a>

    </div>

    <!-- FORM -->

    <form
        action="/products/{{ product.id }}/edit"
        method="POST"
        class="bg-white rounded-2xl shadow p-8"
    >

        <div class="grid grid-cols-2 gap-6">

            <!-- CODE -->

            <div>

                <label class="block text-sm font-semibold mb-2">
                    Código
                </label>

                <input
                    type="text"
                    name="code"
                    value="{{ product.code }}"
                    class="w-full border rounded-xl p-3"
                    required
                >

            </div>

            <!-- NAME -->

            <div>

                <label class="block text-sm font-semibold mb-2">
                    Nombre
                </label>

                <input
                    type="text"
                    name="name"
                    value="{{ product.name }}"
                    class="w-full border rounded-xl p-3"
                    required
                >

            </div>

            <!-- CATEGORY -->

            <div>

                <label class="block text-sm font-semibold mb-2">
                    Categoría
                </label>

                <input
                    type="text"
                    name="category"
                    value="{{ product.category }}"
                    class="w-full border rounded-xl p-3"
                >

            </div>

            <!-- MATERIAL -->

            <div>

                <label class="block text-sm font-semibold mb-2">
                    Material
                </label>

                <input
                    type="text"
                    name="material"
                    value="{{ product.material }}"
                    class="w-full border rounded-xl p-3"
                >

            </div>

            <!-- COLOR -->

            <div>

                <label class="block text-sm font-semibold mb-2">
                    Color
                </label>

                <input
                    type="text"
                    name="color"
                    value="{{ product.color }}"
                    class="w-full border rounded-xl p-3"
                >

            </div>

            <!-- SIZE -->

            <div>

                <label class="block text-sm font-semibold mb-2">
                    Medida
                </label>

                <input
                    type="text"
                    name="size"
                    value="{{ product.size }}"
                    class="w-full border rounded-xl p-3"
                >

            </div>

            <!-- THICKNESS -->

            <div>

                <label class="block text-sm font-semibold mb-2">
                    Espesor
                </label>

                <input
                    type="text"
                    name="thickness"
                    value="{{ product.thickness }}"
                    class="w-full border rounded-xl p-3"
                >

            </div>

            <!-- STOCK -->

            <div>

                <label class="block text-sm font-semibold mb-2">
                    Stock
                </label>

                <input
                    type="number"
                    name="stock"
                    value="{{ product.stock }}"
                    class="w-full border rounded-xl p-3"
                >

            </div>

            <!-- PRICE -->

            <div>

                <label class="block text-sm font-semibold mb-2">
                    Precio
                </label>

                <input
                    type="number"
                    step="0.01"
                    name="price"
                    value="{{ product.price }}"
                    class="w-full border rounded-xl p-3"
                    required
                >

            </div>

            <!-- COST -->

            <div>

                <label class="block text-sm font-semibold mb-2">
                    Costo
                </label>

                <input
                    type="number"
                    step="0.01"
                    name="cost"
                    value="{{ product.cost }}"
                    class="w-full border rounded-xl p-3"
                >

            </div>

        </div>

        <!-- DESCRIPTION -->

        <div class="mt-6">

            <label class="block text-sm font-semibold mb-2">
                Descripción
            </label>

            <textarea
                name="description"
                rows="5"
                class="w-full border rounded-xl p-3"
            >{{ product.description }}</textarea>

        </div>

        <!-- CUSTOM -->

        <div class="mt-6">

            <label class="flex items-center gap-3">

                <input
                    type="checkbox"
                    name="custom"
                    value="yes"

                    {% if product.custom %}
                    checked
                    {% endif %}
                >

                <span>
                    Producto personalizado
                </span>

            </label>

        </div>

        <!-- BUTTONS -->

        <div class="mt-8 flex gap-4">

            <button
                type="submit"
                class="bg-purple-700 hover:bg-purple-800 text-white px-8 py-3 rounded-xl transition"
            >
                Guardar Cambios
            </button>

            <a
                href="/products"
                class="bg-gray-200 hover:bg-gray-300 px-8 py-3 rounded-xl transition"
            >
                Cancelar
            </a>

        </div>

    </form>

</div>

{% endblock %}
