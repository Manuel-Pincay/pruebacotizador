services:
  mysql:
    image: mysql:8.4
    container_name: erp_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: erp
      MYSQL_USER: erp_user
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-erppassword}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --max-connections=150
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-rootpassword}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: erp_app
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      ERP_ENV: production
      DATABASE_URL: mysql+pymysql://erp_user:${MYSQL_PASSWORD:-erppassword}@mysql:3306/erp?charset=utf8mb4
      DB_POOL_SIZE: 20
      DB_MAX_OVERFLOW: 40
      DB_POOL_RECYCLE: 3600
      ERP_SECRET_KEY: ${ERP_SECRET_KEY:-change-me-in-production}
      ERP_SECRETADMIN_PASSWORD: ${ERP_SECRETADMIN_PASSWORD:-203211}
      ERP_COOKIE_SECURE: "false"
    ports:
      - "8000:8000"
    volumes:
      - ./uploads:/app/uploads

volumes:
  mysql_data:
